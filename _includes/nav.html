<header aria-label="Main navigation">
  <nav class="nav-menu" aria-label="Primary">
    <!-- Logo -->
    <a class="nav-logo" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="Apostolos Stamenos" class="nav-logo-mark">
      <div class="nav-logo-text">Apostolos
        <span class="nav-logo-sub"> Stamenos</span>
      </div>
    </a>

    <!-- Search — right-anchored, input expands leftward -->
    <form id="nav-search-wrap" class="nav-dropdown nav-button nav-search-wrap" action="/search/" method="get" role="search">
      <div class="nav-card">
        <div class="nav-card__interior">
          <input class="nav-search__input" type="search" name="q" aria-label="Search site" placeholder="Search…" autocomplete="off">
          <button type="submit" class="nav-search__submit" aria-label="Search site">
            <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </form>

    <!-- Mobile menu toggle — only visible on small screens -->
    <button class="nav-hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-secondary-menu">
      <i class="fas fa-bars" aria-hidden="true"></i>
    </button>

  </nav>
</header>
