<!-- ── Hero ──────────────────────────────────────────────────────────────── -->
<section id="hero">

  <!-- Row 1: brand identity -->
  <div class="hero-identity">
    <h1 class="hero-name">{{ page.name_line1 }}<br/><span class="hero-name-sub">{{ page.name_line2 }}</span></h1>
    <div class="hero-emblem" aria-hidden="true">
      <img src="/assets/images/logo.png" alt="">
    </div>
  </div>

  <!-- Row 2: copy + CTA -->
  <div class="hero-text">
    <p class="hero-eyebrow">{{ page.eyebrow }}</p>
    <p class="hero-tagline">{{ page.tagline | markdownify }}</p>
    <div class="hero-cta">
      <a href="{{ page.cta_url | default: '#work' | relative_url }}" class="btn">{{ page.cta_label | default: 'View My Work' }}</a>
      {% if page.cta2_label %}<a href="{{ page.cta2_url | relative_url }}" class="btn btn--ghost">{{ page.cta2_label }}</a>{% endif %}
    </div>
  </div>


  <div class="scroll-hint">
    <div class="scroll-line"></div>
    <span>Scroll</span>
  </div>
</section>
