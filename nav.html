<header aria-label="Main navigation">
  <nav class="nav-menu" aria-label="Primary">
    <!-- Logo -->
    <a class="nav-logo" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="OUROBOROS" class="nav-logo-mark">
      <div class="nav-logo-text">OUROBOROS
        <span class="nav-logo-sub"> Consulting</span>
      </div>
    </a>

    <!-- Centered button group -->
    <div class="nav-buttons">
      <!-- Quick-exit button: redirects to a neutral page and purges history/state. Always visible for survivors needing to leave fast. Keyboard shortcut: ESC x2. -->
      <div class="nav-dropdown nav-button">
        <div class="nav-card">
          <div class="nav-card__interior">
            <a href="https://www.google.com/search?q=weather+today" id="safety-exit"
              aria-label="Quick exit to a neutral page (double-tap Escape)" rel="noopener noreferrer">
              <i class="fas fa-dungeon" aria-hidden="true"></i>
              <span class="nav-btn-label">Exit</span>
            </a>
          </div>
        </div>
      </div>

      <!-- CMD/CTRL -->
      <div class="nav-dropdown nav-button">
        <div class="nav-card">
          <div class="nav-card__interior">
            <a href="{{ '/del-cmd-ctrl/' | relative_url }}" aria-label="CMD/CTRL Dashboard">
              <i class="fas fa-compass" aria-hidden="true"></i>
              <span class="nav-btn-label">CMD/CTRL</span>
            </a>
          </div>
        </div>
      </div>

      <!-- News -->
      <div class="nav-dropdown nav-button">
        <div class="nav-card">
          <div class="nav-card__interior">
            <a href="{{ '/announcements' | relative_url }}">
              <i class="fas fa-rss" aria-hidden="true"></i>
              <span class="nav-btn-label">News</span>
            </a>
          </div>
        </div>
      </div>

      <!-- Contact -->
      <div class="nav-dropdown nav-button">
        <div class="nav-card">
          <div class="nav-card__interior">
            <a href="{{ '/intake' | relative_url }}">
              <i class="fas fa-envelope" aria-hidden="true"></i>
              <span class="nav-btn-label">Contact</span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Search — right-anchored, input expands leftward -->
    <form id="nav-search-wrap" class="nav-dropdown nav-button nav-search-wrap" action="/search/" method="get" role="search">
      <div class="nav-card">
        <div class="nav-card__interior">
          <input class="nav-search__input" type="search" name="q" aria-label="Search site" placeholder="Search…" autocomplete="off">
          <button type="submit" class="nav-search__submit" aria-label="Search site">
            <i class="fas fa-magnifying-glass" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </form>

    <!-- Mobile menu toggle — only visible on small screens -->
    <button class="nav-hamburger" aria-label="Open navigation menu" aria-expanded="false" aria-controls="nav-secondary-menu">
      <i class="fas fa-bars" aria-hidden="true"></i>
    </button>

  </nav>
</header>
