- title: Everybody Scream
  author: Florence + the Machine
  note: >
    A brilliant treatise on psychological trauma and the pursuit of greatness.

- title: Celestial Blues
  author: King Woman
  note: >
    A crushing re=interpretation of Milton's Paradise Lost.

- title: She Reaches out to She
  author: Chelsea Wolfe
  note: >
    An electronic Wicca ceremony exploring the cyclicality of recovering from psychological trauma.

- title: Preacher's Daughter
  author: Ethel Cain
  note: >
    A southern Gothic concept album that traces the arc of religious trauma, coercive control, and annihilation.
    Ethel Cain doesn't flinch — idealization, entrapment, and destruction are rendered with
    folk-country beauty and devastating clarity.

- title: CALLIGULA
  author: Lingua Ignota
  note: >
    Lingua Ignota's most uncompromising work: a liturgical reckoning with abuse, rage, and survival.
    It is not easy listening — it is a document of what it costs to refuse erasure.

- title: Happier than Ever
  author: Billie Eilish
  note: >
    A collection of confessionals that moves from exhaustion with public scrutiny to quiet, hard-won
    self-possession. The title track is one of the most precise emotional pivots in recent pop:
    from grief to fury without losing either.
