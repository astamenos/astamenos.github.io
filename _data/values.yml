- title: Innovation
  tag: Technology
  icon: fa-solid fa-microscope
  description: >
    The best solutions aren't found in manuals. They are designed and tailored to the problems at hand.
    Whether bridging service continuity during a federal system migration or prototyping
    a data platform under deadline, I build what the situation requires, not what the playbook allows.

- title: Reason
  tag: Science
  icon: fa-solid fa-scale-balanced
  description: >
    Emotions are data, but they aren't evidence. I trained in biostatistics because I believe
    rigorous thinking is one of the most compassionate things you can offer someone in crisis.
    Clear reasoning is a form of respect.

- title: Efficiency
  tag: Technology
  icon: fa-solid fa-fire-flame-curved
  description: >
    Wasted effort compounds. I automate what can be automated, document what needs to persist,
    and focus human attention where it belongs. Good systems shouldn't need heroes.

- title: Autonomy
  tag: Personal
  icon: fa-solid fa-hand-fist
  description: >
    People have the right to make informed decisions about their own lives,
    especially when institutions make that difficult.
    Autonomy isn't just a personal value; it's a design principle.

- title: Integrity
  tag: Ethics
  icon: fa-solid fa-shield-heart
  description: >
    Integrity is what you do when no one is watching, and what you're willing to put on
    record when they are. I've worked in environments where accountability was optional.
    I chose differently.

- title: Transparency
  tag: Ethics
  icon: fa-solid fa-eye
  description: >
    Opacity protects bad systems. Transparency is how individuals protect themselves
    and how communities hold institutions accountable.
    Making things legible is both a technical skill and a civic responsibility.

- title: Security
  tag: Technology
  icon: fa-solid fa-key
  description: >
    Security means different things in different contexts: FedRAMP compliance, data privacy,
    personal safety. The underlying principle is the same — people deserve to be protected,
    not just from external threats, but from systems that are supposed to help them.

- title: Kindness
  tag: Personal
  icon: fa-solid fa-hand-holding-heart
  description: >
    Kindness is not weakness. In work with survivors, it means meeting people where they are
    and honoring what they've endured. It's the foundation that makes everything else possible.
