  - title: OUROBOROS -  A Survivor's Fieldguide to Antagonism, Trama, & Institutional Betrayal
    tag: Essay
    description: >
      A whistleblower memoir beyond just personal trauma and institutional betrayal in the abstract.
      Documented evidence of a specific, concrete mechanism by which a narcissistic threat agent used technology to deceive, harm, and potentially defraud multiple people.
      It covers events that took place in Minnesota from 2023 to 2026, after I moved to Minneapolis to pursue my PhD in biostatistics and documents my encounters with people on the antagonistic externalizing spectrum of psychopathology (i.e., people you might refer to as narcissists or sociopaths).
      It deals with themes of mental illness, domestic abuse, intergenerational trauma, the American Dream/Nightmare, grifters, wealth, science, technology, and the failures of institutions (primarily of the legal system and academia).
      It's a serious and timely exploration of mental illness, abuse, and society.
      It's both a juicy story but also a scholarly treatment of the topic.
      It's vengeful and dark, but also scientifically accurate, eclectic, quirky, and full of hope.
      The symbol of the Ouroboros, the self-devouring snake has a long history in psychology (e.g., Carl Jung wrote about it) and to me it started representing cycles and positive feedback loops:
      cybernetic dysfunction theory, intergenerational trauma, cycles of abuse, BPD relationship cycles, technology development cycles, ponzi schemes, social networks, and more.
    link: "/ouroboros"


