- title: Operational Continuity
  tag: Technology
  description: >
    Due to his expertise and reliability, Apostolos was selected to lead the complex transition of HHS Protect and Vaccines.gov — another mission-critical Department system-from HHS to to CDC and ASPR.
    Over several months, he collaborated closely with departmental leadership and technical teams to ensure a seamless transfer of systems, data, and operational responsibilities.
    He developed automation scripts to maintain uninterrupted data flows and ensured help desk services remained fully functional, safeguarding continuity during a critical public health period.
  reference: Claire German, Project Manager at HHS
  link: "#"

- title: Creative Tech Solutions
  tag: Technology
  description: >
    What truly set Apostolos apart was his ability to find creative, compliant solutions under pressure.
    Keeping machine learning and natural language processing tooling within FedRAMP boundaries is no small feat, and Apostolos consistently found ways to stay within compliance while still advancing the automation agenda.
    His finest moment may have been a last-minute solution he engineered during the Vaccines.gov service desk transition to CDC, designing a custom flow that bridged a critical gap in service continuity while CDC finalized its technical setup.
    It was exactly the kind of creative, calm-under-pressure problem solving that defines exceptional technical talent.
  reference: Todd Hager, VP at Alpha Omega
  link: "#"

- title: Critical Health Data
  tag: Technology
  description: >
    When the OCDO website needed migration, Apostolos demonstrated his initiative by proposing and prototyping solutions using Tyler Technology's Data & Insights platform and Salesforce.
    His recommendation of Salesforce was ultimately adopted, showcasing his foresight in technology solutions. Apostolos consistently demonstrated strong technical abilities, innovative problem-solving skills, and a keen understanding of data management and visualization.
    His contributions were invaluable to our team and the broader efforts in managing and communicating critical health data during challenging times.
  reference: Anthony Caponiti, Director of Data Platforms at HHS
  link: "#"

