- title: Operational Continuity
  tag: Technology
  description: >
    Due to his expertise and reliability, Apostolos was selected to lead the complex transition of HHS Protect
    and Vaccines.gov from HHS to CDC and ASPR. Over several months, he collaborated closely with departmental
    leadership and technical teams to ensure a seamless transfer of systems, data, and operational responsibilities.
    He developed automation scripts to maintain uninterrupted data flows and ensured help desk services remained
    fully functional, safeguarding continuity during a critical public health period.
  reference: Project Manager, HHS

- title: Creative Tech Solutions
  tag: Technology
  description: >
    What truly set Apostolos apart was his ability to find creative, compliant solutions under pressure.
    Keeping machine learning and natural language processing tooling within FedRAMP boundaries is no small feat,
    and Apostolos consistently found ways to stay within compliance while still advancing the automation agenda.
    It was exactly the kind of creative, calm-under-pressure problem solving that defines exceptional technical talent.
  reference: VP, Federal Technology Contractor

- title: Critical Health Data
  tag: Technology
  description: >
    Apostolos demonstrated his initiative by proposing and prototyping solutions using Tyler Technology's
    Data & Insights platform and Salesforce. His recommendation of Salesforce was ultimately adopted,
    showcasing his foresight in technology solutions. His contributions were invaluable to our team
    and the broader efforts in managing and communicating critical health data during challenging times.
  reference: Director of Data Platforms, HHS

