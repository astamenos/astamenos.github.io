- title: Empire of AI - Dreams and Nightmares in Sam Altmans OpenAI
  author: Karen Hao
  note: >
    A thorough investigation of AI companies and the impact of AI on humanity.

- title: Sociopath - A Memoir
  author: Patric Gagne, PhD
  note: >
    A page-turner from a researcher of antisocial PD who happens to have antisocial PD.

- title: Raised by a Serial Killer - Discovering the Truth about my Father
  author: April Balascio
  note: >
    A horrifying investigation of serial killer by the true crime legend who took him down: his own daughter.

- title: Credible - Why We Doubt Accusers and Protect Abusers
  author: Deborah Tuerkheimer
  note: >
    A rigorous legal argument for why credibility — as applied to survivors — is a tool of institutional control.
    Tuerkheimer, a law professor, shows that disbelief is not a cognitive error but a structural feature of systems
    designed to protect reputations over people.


- title: My Friend Anna - The True Story of a Fake Heiress
  author: Rachel DeLoache Williams
  note: >
    A true crime memoir recounting Rachel's unfortunate friendship with fraudulent heiress Anna Delvey.

- title: Bad Blood - Secrets and Lies in a Silicon Valley Startup
  author: John Carreyrou
  note: >
    The definitive investigation of Elizabeth Holmes and Theranos — a masterclass in how charisma,
    manufactured authority, and strategic secrecy can deceive investors, regulators, and the public
    for years. A case study in the anatomy of fraud.

- title: The Gaslit Brain
  author: Jen Fraser, PhD
  note: >
    A whistleblower, researcher, and workplaceabuse survivor maps the measurable neurological damage that gaslighting inflicts.
    Fraser makes the case that psychological abuse is not metaphorical injury — it is physical harm
    to the organ responsible for your sense of reality.
